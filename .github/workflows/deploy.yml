name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Deploy EVEZ Station
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure app exists
        run: |
          flyctl apps create evezstation --org personal 2>/dev/null \
            && echo "App created" \
            || echo "App already exists (or org mismatch — continuing)"

      - name: Inject secrets into Fly
        run: |
          flyctl secrets set \
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            SUPABASE_SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_ENDPOINT_URL_S3="${{ secrets.AWS_ENDPOINT_URL_S3 }}" \
            AWS_REGION="${{ secrets.AWS_REGION }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            BUCKET_NAME="${{ secrets.BUCKET_NAME }}" \
            --stage

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --strategy rolling --wait-timeout 300

      - name: Post-deploy health check
        run: |
          echo "Waiting 20s for machine to stabilize..."
          sleep 20
          MAX_RETRIES=6
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              --max-time 10 \
              https://evezstation.fly.dev/api/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (HTTP $HTTP_CODE)"
              cat /tmp/health.json | jq . 2>/dev/null || cat /tmp/health.json
              exit 0
            fi
            echo "Got HTTP $HTTP_CODE, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "Health check failed after $MAX_RETRIES attempts"
          cat /tmp/health.json 2>/dev/null
          exit 1

      - name: Deploy failure notification
        if: failure()
        run: |
          echo "::error::Deployment failed. Check Fly.io logs: flyctl logs -a evezstation"
          flyctl status -a evezstation || true
          flyctl logs -a evezstation --no-tail 2>/dev/null | tail -50 || true
