<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OktoKlaw — EVEZ Station AI Chat</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text2: #8888a0;
    --accent: #6c5ce7;
    --accent2: #a78bfa;
    --green: #00d4aa;
    --red: #ff6b6b;
    --orange: #ffa726;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-header .logo { font-size: 28px; }
  .sidebar-header h1 { font-size: 18px; font-weight: 700; }
  .sidebar-header span { font-size: 11px; color: var(--text2); display: block; }
  .new-chat-btn {
    margin: 16px 20px 8px;
    padding: 10px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .new-chat-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .thread-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  .thread-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .thread-item:hover { background: var(--surface2); }
  .thread-item.active { background: var(--accent); color: white; }
  .thread-item .avatar { font-size: 18px; flex-shrink: 0; }
  .thread-item .info { overflow: hidden; }
  .thread-item .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread-item .preview { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread-item.active .preview { color: rgba(255,255,255,0.7); }

  /* ─── Main Chat ─── */
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .chat-header .avatar { font-size: 24px; }
  .chat-header .name { font-weight: 700; font-size: 16px; }
  .chat-header .model { font-size: 11px; color: var(--text2); }

  /* Persona Switcher */
  .persona-bar {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .persona-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .persona-chip:hover { border-color: var(--accent); color: var(--text); }
  .persona-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .message {
    max-width: 720px;
    line-height: 1.6;
    font-size: 14px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .message.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    padding: 12px 16px;
    border-radius: 16px 16px 4px 16px;
  }
  .message.assistant {
    align-self: flex-start;
    background: var(--surface2);
    padding: 16px 20px;
    border-radius: 4px 16px 16px 16px;
    border: 1px solid var(--border);
  }
  .message.assistant .avatar-inline {
    font-size: 14px;
    margin-right: 6px;
  }
  .message pre {
    background: var(--bg);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .message code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .message pre code { background: none; padding: 0; }

  /* Suggestions */
  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 24px 8px;
  }
  .suggestion-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }

  /* Input */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .input-row textarea {
    flex: 1;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea::placeholder { color: var(--text2); }
  .send-btn {
    padding: 12px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Welcome Screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text2);
    padding: 40px;
    text-align: center;
  }
  .welcome .big-emoji { font-size: 64px; margin-bottom: 8px; }
  .welcome h2 { color: var(--text); font-size: 24px; }
  .welcome p { max-width: 400px; line-height: 1.6; font-size: 14px; }
  .welcome-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 16px;
    width: 100%;
    max-width: 600px;
  }
  .welcome-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .welcome-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .welcome-card .emoji { font-size: 24px; margin-bottom: 8px; }
  .welcome-card .title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .welcome-card .desc { font-size: 11px; color: var(--text2); }

  /* Loading */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-self: flex-start;
  }
  .typing-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text2);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.7); } 40% { transform: scale(1); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <span class="logo">🐙</span>
    <div>
      <h1>OktoKlaw</h1>
      <span>EVEZ Station AI Chat</span>
    </div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  <div class="thread-list" id="threadList"></div>
</div>

<div class="chat-main">
  <div class="chat-header" id="chatHeader" style="display:none;">
    <div class="chat-header-left">
      <span class="avatar" id="headerAvatar">🐙</span>
      <div>
        <div class="name" id="headerName">OktoKlaw</div>
        <div class="model" id="headerModel">llama-3.3-70b</div>
      </div>
    </div>
  </div>

  <div class="persona-bar" id="personaBar" style="display:none;"></div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="big-emoji">🐙</div>
      <h2>Welcome to OktoKlaw</h2>
      <p>Your multi-persona AI assistant powered by EVEZ Station. Choose a persona and start chatting — or just dive in.</p>
      <div class="welcome-cards" id="welcomeCards"></div>
    </div>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Message OktoKlaw..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentThread = null;
let currentPersona = "default";
let personas = [];
let threads = [];
let userId = localStorage.getItem("okto_uid") || (() => {
  const uid = "user_" + Math.random().toString(36).slice(2, 10);
  localStorage.setItem("okto_uid", uid);
  return uid;
})();

// ─── Init ─────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(`${API}/api/oktoklaw/personas`);
    personas = await res.json();
    renderPersonaBar();
    renderWelcomeCards();
    await loadThreads();
  } catch (e) {
    console.error("Init error:", e);
  }
}

function renderPersonaBar() {
  const bar = document.getElementById("personaBar");
  bar.innerHTML = personas.map(p =>
    `<button class="persona-chip ${p.id === currentPersona ? 'active' : ''}" onclick="switchPersona('${p.id}')">
      ${p.avatar} ${p.name}
    </button>`
  ).join("");
}

function renderWelcomeCards() {
  const cards = document.getElementById("welcomeCards");
  const starters = [
    { emoji: "⚡", title: "Write Code", desc: "Generate production-ready code with tests", msg: "Write a REST API with authentication in Node.js" },
    { emoji: "🔬", title: "Analyze Data", desc: "Deep analysis and insights", msg: "Analyze the pros and cons of microservices vs monolith" },
    { emoji: "🐙", title: "Explore EVEZ", desc: "Learn about the platform APIs", msg: "What can EVEZ Station do? Show me all available APIs" },
    { emoji: "🛡️", title: "Security Audit", desc: "Find vulnerabilities and fix them", msg: "Review my Express.js app for common security issues" },
  ];
  cards.innerHTML = starters.map(s =>
    `<div class="welcome-card" onclick="quickStart('${s.msg}')">
      <div class="emoji">${s.emoji}</div>
      <div class="title">${s.title}</div>
      <div class="desc">${s.desc}</div>
    </div>`
  ).join("");
}

async function loadThreads() {
  try {
    const res = await fetch(`${API}/api/oktoklaw/threads?userId=${userId}`);
    threads = await res.json();
    renderThreads();
  } catch (e) { console.error(e); }
}

function renderThreads() {
  const list = document.getElementById("threadList");
  list.innerHTML = threads.map(t =>
    `<div class="thread-item ${currentThread === t.id ? 'active' : ''}" onclick="loadThread('${t.id}')">
      <span class="avatar">${t.avatar}</span>
      <div class="info">
        <div class="name">${t.personaName}</div>
        <div class="preview">${escapeHtml(t.preview) || 'New conversation'}</div>
      </div>
    </div>`
  ).join("") || '<div style="padding:16px;color:var(--text2);font-size:13px;text-align:center;">No conversations yet</div>';
}

// ─── Chat ─────────────────────────────────────────────────
async function newChat(persona) {
  const p = persona || currentPersona;
  try {
    const res = await fetch(`${API}/api/oktoklaw/start`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId, persona: p }),
    });
    const data = await res.json();
    currentThread = data.threadId;
    currentPersona = p;
    document.getElementById("welcome").style.display = "none";
    document.getElementById("chatHeader").style.display = "flex";
    document.getElementById("personaBar").style.display = "flex";
    document.getElementById("headerAvatar").textContent = data.persona.avatar;
    document.getElementById("headerName").textContent = data.persona.name;
    clearMessages();
    renderPersonaBar();
    await loadThreads();
    document.getElementById("input").focus();
  } catch (e) { console.error(e); }
}

async function loadThread(threadId) {
  try {
    const res = await fetch(`${API}/api/oktoklaw/thread/${threadId}`);
    const data = await res.json();
    if (!data) return;
    currentThread = threadId;
    currentPersona = data.persona;
    document.getElementById("welcome").style.display = "none";
    document.getElementById("chatHeader").style.display = "flex";
    document.getElementById("personaBar").style.display = "flex";
    document.getElementById("headerAvatar").textContent = data.avatar;
    document.getElementById("headerName").textContent = data.personaName;
    clearMessages();
    renderPersonaBar();
    renderThreads();
    data.messages.forEach(m => appendMessage(m.role, m.content));
    scrollToBottom();
    document.getElementById("input").focus();
  } catch (e) { console.error(e); }
}

async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;
  
  if (!currentThread) await newChat();
  
  input.value = "";
  input.style.height = "44px";
  document.getElementById("suggestions").innerHTML = "";
  appendMessage("user", msg);
  scrollToBottom();
  
  const typing = showTyping();
  document.getElementById("sendBtn").disabled = true;

  try {
    const res = await fetch(`${API}/api/oktoklaw/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ threadId: currentThread, message: msg }),
    });
    const data = await res.json();
    typing.remove();
    
    if (data.error) {
      appendMessage("assistant", `Error: ${data.error}`);
    } else {
      appendMessage("assistant", data.response, data.persona?.avatar);
      if (data.suggestions?.length) renderSuggestions(data.suggestions);
    }
    scrollToBottom();
    await loadThreads();
  } catch (e) {
    typing.remove();
    appendMessage("assistant", `Connection error: ${e.message}`);
  }
  document.getElementById("sendBtn").disabled = false;
  input.focus();
}

function quickStart(msg) {
  document.getElementById("input").value = msg;
  send();
}

async function switchPersona(personaId) {
  if (!currentThread) {
    currentPersona = personaId;
    renderPersonaBar();
    return;
  }
  try {
    const res = await fetch(`${API}/api/oktoklaw/persona`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ threadId: currentThread, persona: personaId }),
    });
    const data = await res.json();
    currentPersona = personaId;
    document.getElementById("headerAvatar").textContent = data.avatar;
    document.getElementById("headerName").textContent = data.name;
    renderPersonaBar();
    appendMessage("assistant", `Switched to ${data.avatar} ${data.name}`);
  } catch (e) { console.error(e); }
}

// ─── Rendering ────────────────────────────────────────────
function appendMessage(role, content, avatar) {
  const div = document.createElement("div");
  div.className = `message ${role}`;
  if (role === "assistant" && avatar) {
    div.innerHTML = `<span class="avatar-inline">${avatar}</span> ${renderMarkdown(content)}`;
  } else if (role === "assistant") {
    div.innerHTML = renderMarkdown(content);
  } else {
    div.textContent = content;
  }
  document.getElementById("messages").appendChild(div);
}

function clearMessages() {
  const m = document.getElementById("messages");
  m.innerHTML = "";
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "typing-indicator";
  div.innerHTML = "<span></span><span></span><span></span>";
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
  return div;
}

function renderSuggestions(suggestions) {
  document.getElementById("suggestions").innerHTML = suggestions.map(s =>
    `<button class="suggestion-chip" onclick="quickStart('${escapeHtml(s)}')">${escapeHtml(s)}</button>`
  ).join("");
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

function renderMarkdown(text) {
  return text
    .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^- (.+)$/gm, '• $1<br>')
    .replace(/\n/g, '<br>');
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = "44px";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

init();
</script>
</body>
</html>
