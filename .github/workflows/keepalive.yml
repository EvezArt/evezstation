name: EVEZ Keepalive + FIRE Cascade
on:
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive commit
        run: |
          git config user.name "evez-bot"
          git config user.email "evezproductions@gmail.com"
          date > .keepalive
          git add .keepalive
          git commit -m "keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes"
          git push || echo "Push skipped"

  fire-cascade:
    runs-on: ubuntu-latest
    needs: keepalive
    if: github.event.schedule == '0 0 */3 * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger FIRE across EVEZ repos
        env:
          GH_TOKEN: ${{ secrets.EVEZ_PAT }}
        run: |
          REPOS=("evez666-arg-canon" "evez-autonomous-ledger" "evez-agentnet" "Evez666" "evez-platform" "maes" "nexus" "evezstation")
          CURRENT="${{ github.event.repository.name }}"
          for repo in "${REPOS[@]}"; do
            if [ "$repo" != "$CURRENT" ]; then
              echo "Firing: $repo"
              curl -s -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/EvezArt/$repo/dispatches" \
                -d '{"event_type":"fire_cascade"}' || echo "Skip $repo"
            fi
          done
          echo "FIRE cascade complete"
