name: Deploy to Fly.io
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly app if it doesn't exist
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if flyctl status --app evezstation 2>/dev/null; then
            echo "App exists — skipping create"
          else
            echo "Creating app evezstation in org evez..."
            flyctl apps create evezstation --org evez
          fi

      - name: Push secrets to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          flyctl secrets set \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_SERVICE_KEY="$SUPABASE_SERVICE_KEY" \
            NODE_ENV=production \
            BASE_URL=https://evezstation.fly.dev \
            --app evezstation 2>/dev/null || echo "Secrets already set"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --app evezstation --wait-timeout 180
