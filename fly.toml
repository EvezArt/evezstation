# EVEZ Station — Fly.io deployment config
# Auto-deployed via GitHub Actions on push to main

app = "evezstation"
primary_region = "lax"

[build]
  # Uses Dockerfile in repo root

[env]
  PORT = "3000"
  NODE_ENV = "production"
  BASE_URL = "https://evezstation.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
